        header {

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            background: #0a0a0a;

            border-bottom: 1px solid #333;
        }

        .tab-btn {
            background: #000;
            color: #888;
            border: none;
            padding: 15px 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            flex: 1;
            text-align: center;
            transition: all 0.2s;
            border-right: 1px solid #222;
        }

        .tab-btn:last-child { border-right: none; }

        .tab-btn.active {
            background: #b200ff;
            color: #000;
            box-shadow: inset 0 0 10px #5e0087;
        }

        /* SELETTORE SERVER (Novità) */
        .server-bar {
            background: #111;
            padding: 8px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        .srv-btn {
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 4px 12px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .srv-btn:hover, .srv-btn.active {
            border-color: #00ff00;
            color: #00ff00;
            background: #0a0a0a;
        }

        /* AREA VISUALIZZAZIONE TOOL */
        .tool-viewport {
            display: none;
            width: 100%;
            height: calc(100vh - 130px);
            overflow: hidden;
            position: relative;

        }

        .tool-viewport.active { display: block; }

        /* IFRAME STYLE */
        iframe {

<script>
    // Cambio Tab Principale
    function openTab(viewId, btnElement) {
        document.querySelectorAll('.tool-viewport').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        btnElement.classList.add('active');
    }

    // Cambio Server (Tab Followers)
    function changeServer(iframeId, newUrl, btnElement) {
        const iframe = document.getElementById(iframeId);
        
        // Effetto visivo di ricaricamento
        iframe.style.opacity = 0;
        
        // Cambio URL
        setTimeout(() => {
            iframe.src = newUrl;
            iframe.style.opacity = 1;
        }, 300);

        // Aggiorna stato bottoni server
        // (Rimuove classe 'active' dagli altri bottoni fratelli)
        const parent = btnElement.parentElement;
        const siblings = parent.getElementsByClassName('srv-btn');
        for (let i = 0; i < siblings.length; i++) {
            siblings[i].classList.remove('active');
        }
        btnElement.classList.add('active');
    }
</script>
